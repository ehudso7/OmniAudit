name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build frontend
        run: pnpm --filter omniaudit-dashboard build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || '' }}

      # Note: Vercel's native GitHub integration handles automatic deployments.
      # This workflow validates the build succeeds. If you need manual deployment,
      # configure the Vercel project to use the 'frontend' directory as root.
      - name: Verify build artifacts
        run: |
          echo "Frontend build completed successfully"
          ls -la frontend/dist/
