# Render.com Blueprint Configuration
# Deploy: https://render.com/docs/blueprint-spec

services:
  # OmniAudit Backend API
  - type: web
    name: omniaudit-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: .
    buildCommand: pip install -e .
    startCommand: uvicorn omniaudit.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: omniaudit-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://omni-audit.vercel.app,https://*.vercel.app"

  # OmniAudit Frontend (alternative to Vercel)
  - type: web
    name: omniaudit-frontend
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: omniaudit-db
    plan: free
    databaseName: omniaudit
    user: omniaudit
    region: oregon
